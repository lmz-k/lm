            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.07); 
            padding: 40px;

            backdrop-filter: blur(15px);

            align-items: center;

            gap: 10px; 
        }

        .link-card i {
            font-size: 1.2rem; 
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            border-color: #7289da; 
        }

        .link-icon {
            width: 20px;       
            height: 20px;      
            object-fit: contain; 
            vertical-align: middle;
        }

        #music-status {
            font-size: 10px;
            opacity: 0.4;
